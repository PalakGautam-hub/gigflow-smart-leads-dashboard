version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: gigflow-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - gigflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/gigflow
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
    networks:
      - gigflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigflow-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - gigflow-network

volumes:
  mongo-data:

networks:
  gigflow-network:
    driver: bridge
